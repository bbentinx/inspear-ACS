services:
  postgres:
    image: postgres:16-alpine
    container_name: inspear-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-inspear}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: ${POSTGRES_DB:-inspear}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./sql/001_schema.sql:/docker-entrypoint-initdb.d/001_schema.sql:ro
      - ./sql/002_config_profiles.sql:/docker-entrypoint-initdb.d/002_config_profiles.sql:ro
    # Porta não exposta no host (evita conflito com postgres local)
    # ports:
    #   - "${POSTGRES_PORT:-5434}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-inspear}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: inspear-redis
    restart: unless-stopped
    # ports:
    #   - "${REDIS_PORT:-6381}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  api:
    build: ./backend
    container_name: inspear-api
    restart: unless-stopped
    env_file: .env
    environment: &api_env
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-inspear}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/${POSTGRES_DB:-inspear}
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET: ${JWT_SECRET:-change-me-jwt}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@inspear.local}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin123}
      INSPEAR_API_KEY: ${INSPEAR_API_KEY:-inspear-dev-key}
      GENIEACS_NBI_URL: ${GENIEACS_NBI_URL:-http://genieacs:7557}
      GENIEACS_SYNC_ENABLED: ${GENIEACS_SYNC_ENABLED:-false}
      GENIEACS_SYNC_INTERVAL_SECONDS: ${GENIEACS_SYNC_INTERVAL_SECONDS:-300}
      ALLOW_SIMULATED_ACTIONS: ${ALLOW_SIMULATED_ACTIONS:-true}
      AUTH_ENABLED: ${AUTH_ENABLED:-true}
      SPEED_TEST_SERVER_NAME: ${SPEED_TEST_SERVER_NAME:-core Lab Fer}
      SPEED_TEST_SERVER_CITY: ${SPEED_TEST_SERVER_CITY:-Fernandópolis}
      SPEED_TEST_SERVER_HOST: ${SPEED_TEST_SERVER_HOST:-localhost:8000}
      SPEED_TEST_DOWNLOAD_URL: ${SPEED_TEST_DOWNLOAD_URL:-http://localhost:8000/examples/speedtest/100mb.bin}
      SPEED_TEST_UPLOAD_URL: ${SPEED_TEST_UPLOAD_URL:-http://speedtest.tele2.net/upload.php}
    ports:
      - "${API_PORT:-8000}:8000"
    volumes:
      - ./backend/app:/app/app
      - ./examples:/app/examples:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  worker:
    build: ./backend
    container_name: inspear-worker
    restart: unless-stopped
    command: python -m app.workers.sync_worker
    env_file: .env
    environment: *api_env
    volumes:
      - ./backend/app:/app/app
    depends_on:
      api:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    build: ./web
    container_name: inspear-web
    restart: unless-stopped
    environment:
      INTERNAL_API_URL: http://inspear-api:8000
      NEXT_PUBLIC_API_URL: ""
    ports:
      - "${WEB_PORT:-3000}:3000"
    depends_on:
      api:
        condition: service_healthy

  # === GenieACS TR-069 (opcional: make up-full) ===
  # drumsergio/genieacs = CWMP + NBI + FS + UI em um container (supervisord)
  genieacs-mongo:
    profiles: [genieacs]
    image: mongo:6
    container_name: genieacs-mongo
    restart: unless-stopped
    volumes:
      - genieacs_mongo:/data/db

  genieacs:
    profiles: [genieacs]
    image: drumsergio/genieacs:1.2.16.0
    container_name: genieacs
    restart: unless-stopped
    ports:
      - "7547:7547"   # CWMP TR-069 — ONTs apontam aqui
      - "7557:7557"   # NBI REST API
      - "7567:7567"   # File Server (firmware)
      - "3001:3000"   # UI admin
    environment:
      GENIEACS_MONGODB_CONNECTION_URL: mongodb://genieacs-mongo:27017/genieacs
      GENIEACS_UI_JWT_SECRET: changeme-genieacs-jwt
    depends_on:
      - genieacs-mongo

volumes:
  pgdata:
  genieacs_mongo: